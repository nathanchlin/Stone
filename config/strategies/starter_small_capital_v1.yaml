meta:
  name: starter_small_capital_v1
  version: 0.1.0
  description: Starter strategy for small-capital validation with simpler A-share execution constraints.
  created_at: 2026-06-14
universe:
  rules_file: config/universe_rules.starter.yaml
  history_days: 250
filters:
  - factor: price_above_ma60
    criterion: ">= 1"
  - factor: rsi_in_healthy_zone
    criterion: ">= 1"
scoring:
  method: weighted_average
  factors:
    - factor: ma_bullish_alignment
      weight: 0.4
    - factor: volume_ratio
      weight: 0.3
      params:
        avg_window: 5
    - factor: turnover_rate
      weight: 0.2
      params:
        zone: [1.5, 8.0]
    - factor: price_above_ma60
      weight: 0.1
output:
  top_n: 8
  min_score: 55.0
  sort_by: score
  sort_desc: true
  formats:
    - markdown
    - json
constraints:
  max_per_industry: 2
  max_per_theme: 3
